services:
  # ====== Database Layer ======
  postgres:
    image: postgres:16-alpine
    container_name: wallet-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c max_connections=1000 -c shared_buffers=512MB -c effective_cache_size=2GB -c maintenance_work_mem=128MB -c random_page_cost=1.1"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - wallet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ====== Cache Layer ======
  redis:
    image: redis:7-alpine
    container_name: wallet-redis
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly yes
      - --appendfilename "appendonly.aof"
      - --dir /data
      - --maxmemory 512mb
      - --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - wallet-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: wallet-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - wallet-network
    # command: >
    #   bash -c "
    #   /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic wallet.transaction.completed --bootstrap-server kafka:9092 &&
    #   /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic wallet.transaction.failed --bootstrap-server kafka:9092
    #   "
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-topics.sh",
          "--bootstrap-server",
          "127.0.0.1:9092",
          "--list",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ====== Individual Services (Gateway + Wallet API + Notification API) ======

  wallet-api:
    build:
      context: ./services/wallet
      dockerfile: wallet.api/Dockerfile
    image: wallet-api:latest
    container_name: wallet-api
    environment:
      ASPNETCORE_HTTP_PORT: 8080
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

      # Key matches Program.cs expectations
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=300;"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},ssl=false,abortConnect=false"

      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS}
      Kafka__GroupId: ${KAFKA__GROUP_ID}
      Kafka__Topic: ${KAFKA__TOPIC}
      Kafka__FailureTopic: ${KAFKA__FAILURE_TOPIC}

      # Object nesting hierarchy notation
      Jwt_Issuer: ${JWT_ISSUER}
      Jwt_Audience: ${JWT_AUDIENCE}
      Jwt_Secret: ${JWT_SECRET}

      Logging__LogLevel__Default: ${LOG_LEVEL:-Error}
      Logging__LogLevel__Microsoft.AspNetCore: Warning
      Logging__LogLevel__Microsoft.EntityFrameworkCore: Warning
      Logging__LogLevel__Microsoft.Hosting.Lifetime: Information
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - wallet-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  wallet-notification:
    build:
      context: ./services/notification
      dockerfile: notification.api/Dockerfile
    image: wallet-notification:latest
    container_name: wallet-notification
    environment:
      ASPNETCORE_HTTP_PORT: 8080
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}

      #  Key matches Program.cs expectations
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=300;"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},ssl=false,abortConnect=false"

      #  Object nesting hierarchy notation
      Jwt_Issuer: ${JWT_ISSUER}
      Jwt_Audience: ${JWT_AUDIENCE}
      Jwt_Secret: ${JWT_SECRET}

      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS}
      Kafka__GroupId: ${KAFKA__GROUP_ID}
      Kafka__Topic: ${KAFKA__TOPIC}
      Kafka__FailureTopic: ${KAFKA__FAILURE_TOPIC}

      NotificationApi__HubUrl: ${NOTIFICATION_URL}
      LOG_LEVEL: ${LOG_LEVEL:-Error}
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - wallet-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  wallet-gateway:
    build:
      context: .
      dockerfile: gateway/wallet.gateway/Dockerfile
    image: wallet-gateway:latest
    container_name: wallet-gateway
    environment:
      ASPNETCORE_HTTP_PORT: 8080
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

      # Key matches Program.cs expectations
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=300;"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},ssl=false,abortConnect=false"

      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS}
      # Precise YARP Environment overrides to map target destination routing properties
      ReverseProxy__Clusters__wallet-cluster__Destinations__wallet-api-default__Address: "http://wallet-api:8080/"
      ReverseProxy__Clusters__notification-cluster__Destinations__notification-api-default__Address: "http://wallet-notification:8080/"

      # Object nesting hierarchy notation
      Jwt_Issuer: ${JWT_ISSUER}
      Jwt_Audience: ${JWT_AUDIENCE}
      Jwt_Secret: ${JWT_SECRET}
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Frontend__BaseUrl: http://localhost:4200

      Logging__LogLevel__Default: ${LOG_LEVEL:-Error}
      Logging__LogLevel__Microsoft: Warning
      Logging__LogLevel__Microsoft.AspNetCore: Warning
      Logging__LogLevel__Yarp: Information
      Logging__LogLevel__System: Warning
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      wallet-api:
        condition: service_healthy
      wallet-notification:
        condition: service_healthy
    networks:
      - wallet-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ====== Load Balancer (Nginx) ======
  nginx:
    image: nginx:alpine
    container_name: wallet-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      wallet-gateway:
        condition: service_healthy
      wallet-notification:
        condition: service_healthy
    networks:
      - wallet-network
    healthcheck:
      # **CRITICAL: Health check using /health endpoint (no redirects)**
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

