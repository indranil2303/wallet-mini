services:
  # ====== Database Layer ======
  postgres:
    image: postgres:16-alpine
    container_name: wallet-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c max_connections=1000 -c shared_buffers=512MB -c effective_cache_size=2GB -c maintenance_work_mem=128MB -c random_page_cost=1.1"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - wallet-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ====== Cache Layer ======
  redis:
    image: redis:7-alpine
    container_name: wallet-redis
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly yes
      - --appendfilename "appendonly.aof"
      - --dir /data
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - wallet-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: wallet-kafka
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - wallet-network
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "127.0.0.1:9092", "--list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:0.154.0
    container_name: wallet-otel-collector
    command:
      - --config=/etc/otel-collector-config.yml
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "13133:13133"
    networks:
      - wallet-network
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: wallet-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - wallet-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: wallet-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer # Changed from Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=false # Re-enabled so admins can actually log in
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    depends_on:
      - tempo
    networks:
      - wallet-network
    restart: unless-stopped

  # ====== Individual Services (Gateway + Wallet API + Notification API) ======

  wallet-api:
    build:
      context: .
      dockerfile: services/wallet/wallet.api/Dockerfile
    image: wallet-api:latest
    container_name: wallet-api
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      ASPNETCORE_HTTP_PORT: 8080
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=512;"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},ssl=false,abortConnect=false"
      Jwt_Issuer: ${JWT_ISSUER}
      Jwt_Audience: ${JWT_AUDIENCE}
      Jwt_Secret: ${JWT_SECRET}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS}
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      Logging__LogLevel__Default: ${LOG_LEVEL:-Error}
      Logging__LogLevel__Microsoft.AspNetCore: Warning
      Logging__LogLevel__Microsoft.EntityFrameworkCore: Warning
      Logging__LogLevel__Microsoft.Hosting.Lifetime: Information
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - wallet-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  wallet-notification:
    build:
      context: .
      dockerfile: services/notification/notification.api/Dockerfile
    image: wallet-notification:latest
    container_name: wallet-notification
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      ASPNETCORE_HTTP_PORT: 8080
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=512;"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},ssl=false,abortConnect=false"
      Jwt_Issuer: ${JWT_ISSUER}
      Jwt_Audience: ${JWT_AUDIENCE}
      Jwt_Secret: ${JWT_SECRET}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS}
      Kafka__GroupId: wallet-notification-group
      Kafka__Topic: wallet.transaction.completed
      Redis__BatchSize: 100
      Redis__ThrottlingInterval: 00:00:02
      Redis__LockTimeout: 00:00:30
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      NotificationApi__HubUrl: ${NOTIFICATION_URL}
      Logging__LogLevel__Default: ${LOG_LEVEL:-Error}
      Logging__LogLevel__Microsoft.AspNetCore: Warning
      Logging__LogLevel__Microsoft.Hosting.Lifetime: Information
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - wallet-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  wallet-gateway:
    build:
      context: .
      dockerfile: gateway/wallet.gateway/Dockerfile
    image: wallet-gateway:latest
    container_name: wallet-gateway
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      ASPNETCORE_HTTP_PORT: 8080
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=512;"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},ssl=false,abortConnect=false"
      ReverseProxy__Clusters__wallet-cluster__Destinations__wallet-api-default__Address: "http://wallet-api:8080/"
      ReverseProxy__Clusters__notification-cluster__Destinations__notification-api-default__Address: "http://wallet-notification:8080/"
      Jwt_Issuer: ${JWT_ISSUER}
      Jwt_Audience: ${JWT_AUDIENCE}
      Jwt_Secret: ${JWT_SECRET}
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS}
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      Frontend__BaseUrl: http://localhost:4200
      Logging__LogLevel__Default: ${LOG_LEVEL:-Error}
      Logging__LogLevel__Microsoft: Warning
      Logging__LogLevel__Microsoft.AspNetCore: Warning
      Logging__LogLevel__Microsoft.EntityFrameworkCore: Warning
      Logging__LogLevel__Yarp: Information
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      wallet-api:
        condition: service_healthy
      wallet-notification:
        condition: service_healthy
    networks:
      - wallet-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  wallet-fraud-worker:
    build:
      context: .
      dockerfile: services/wallet/wallet.fraud-detection/Dockerfile
    image: wallet-fraud-worker:latest
    container_name: wallet-fraud-worker
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=512;"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},ssl=false,abortConnect=false"
      Kafka__BootstrapServers: ${KAFKA_BOOTSTRAP_SERVERS}
      Kafka__GroupId: wallet-fraud-detect-group
      Kafka__Topic: wallet.transaction.requested
      Redis__BatchSize: 100
      Redis__ThrottlingInterval: 00:00:02
      Redis__LockTimeout: 00:00:30
      OpenTelemetry__OtlpEndpoint: http://otel-collector:4317
      Logging__LogLevel__Default: ${LOG_LEVEL:-Error}
      Logging__LogLevel__Microsoft.AspNetCore: Warning
      Logging__LogLevel__Microsoft.EntityFrameworkCore: Warning
      Logging__LogLevel__Microsoft.Hosting.Lifetime: Information
      MLModelPath: /models/FraudDetection.zip
    volumes:
      - ./services/wallet/wallet.fraud-detection/models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - wallet-network
    restart: unless-stopped

  # ====== Load Balancer (Nginx) ======
  nginx:
    image: nginx:alpine
    container_name: wallet-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      wallet-gateway:
        condition: service_healthy
      wallet-notification:
        condition: service_healthy
    networks:
      - wallet-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

